<svg xmlns="http://www.w3.org/-2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Main Berry Body -->
  <circle cx="50" cy="55" r="35" fill="hsl(280, 100%, 60%)" stroke="hsl(280, 50%, 10%)" stroke-width="4" />
  
  <!-- Texture highlights -->
  <circle cx="35" cy="45" r="4" fill="hsl(300, 20%, 98%)" opacity="0.6"/>
  <circle cx="65" cy="45" r="3" fill="hsl(300, 20%, 98%)" opacity="0.4"/>
  <circle cx="50" cy="75" r="2.5" fill="hsl(300, 20%, 98%)" opacity="0.3"/>
  <circle cx="30" cy="60" r="3" fill="hsl(300, 20%, 98%)" opacity="0.5"/>
  <circle cx="70" cy="65" r="4" fill="hsl(300, 20%, 98%)" opacity="0.4"/>
  
  <!-- Leaves -->
  <path d="M50 20 C40 10, 20 20, 25 35 C40 30, 45 25, 50 20 Z" fill="hsl(120, 100%, 45%)" stroke="hsl(280, 50%, 10%)" stroke-width="3" />
  <path d="M50 20 C60 10, 80 20, 75 35 C60 30, 55 25, 50 20 Z" fill="hsl(120, 100%, 45%)" stroke="hsl(280, 50%, 10%)" stroke-width="3" />
  <path d="M50 20 L50 12" stroke="hsl(280, 50%, 10%)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Sunglasses -->
  <path d="M25 45 L75 45 L70 55 L30 55 Z" fill="hsl(280, 50%, 10%)" stroke="hsl(300, 20%, 98%)" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Mouth (smirk) -->
  <path d="M40 70 Q50 75 60 68" fill="none" stroke="hsl(280, 50%, 10%)" stroke-width="3" stroke-linecap="round"/>
</svg>