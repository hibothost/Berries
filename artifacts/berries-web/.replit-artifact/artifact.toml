kind = "web"
previewPath = "/"
title = "Berries — Meme Coin"
version = "1.0.0"
id = "artifacts/berries-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21793

[services.development]
run = "pnpm --filter @workspace/berries-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/berries-web", "run", "build" ]
publicDir = "artifacts/berries-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21793"
BASE_PATH = "/"
